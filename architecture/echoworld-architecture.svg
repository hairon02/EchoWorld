<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">EchoWorld — Architecture Diagram</text>
  <text x="450" y="58" text-anchor="middle" fill="#8b9ab0" font-size="12">Creative Apps Challenge · Microsoft Agents League</text>

  <!-- ───── LAYER LABELS ───── -->
  <text x="24" y="105" fill="#4a90d9" font-size="11" font-weight="bold" letter-spacing="1">CLIENT</text>
  <text x="24" y="255" fill="#4a90d9" font-size="11" font-weight="bold" letter-spacing="1">BACKEND</text>
  <text x="24" y="435" fill="#4a90d9" font-size="11" font-weight="bold" letter-spacing="1">AI / DATA</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 1 — CLIENT                           -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- React + Vite box -->
  <rect x="80" y="72" width="200" height="80" rx="10" fill="#1a2235" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="180" y="102" text-anchor="middle" fill="#4a90d9" font-size="13" font-weight="bold">React + Vite</text>
  <text x="180" y="120" text-anchor="middle" fill="#8b9ab0" font-size="11">Narrative UI · TailwindCSS</text>
  <text x="180" y="136" text-anchor="middle" fill="#8b9ab0" font-size="11">Framer Motion animations</text>

  <!-- GitHub Copilot box -->
  <rect x="340" y="72" width="200" height="80" rx="10" fill="#1a2235" stroke="#238636" stroke-width="1.5"/>
  <text x="440" y="99" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">GitHub Copilot</text>
  <text x="440" y="117" text-anchor="middle" fill="#8b9ab0" font-size="11">Code suggestions</text>
  <text x="440" y="133" text-anchor="middle" fill="#8b9ab0" font-size="11">Copilot Chat · MCP Server</text>

  <!-- Developer box -->
  <rect x="600" y="72" width="200" height="80" rx="10" fill="#1a2235" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="700" y="99" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">Developer (VS Code)</text>
  <text x="700" y="117" text-anchor="middle" fill="#8b9ab0" font-size="11">Builds with Copilot</text>
  <text x="700" y="133" text-anchor="middle" fill="#8b9ab0" font-size="11">Prompts · Reviews · Iterates</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 2 — BACKEND                          -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Node.js + Express box -->
  <rect x="80" y="220" width="200" height="80" rx="10" fill="#1a2235" stroke="#f0883e" stroke-width="1.5"/>
  <text x="180" y="249" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="bold">Node.js + Express</text>
  <text x="180" y="267" text-anchor="middle" fill="#8b9ab0" font-size="11">REST API · Socket.io</text>
  <text x="180" y="283" text-anchor="middle" fill="#8b9ab0" font-size="11">WebSocket real-time stream</text>

  <!-- Game Engine box -->
  <rect x="340" y="220" width="200" height="80" rx="10" fill="#1a2235" stroke="#f0883e" stroke-width="1.5"/>
  <text x="440" y="249" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="bold">Game Engine</text>
  <text x="440" y="267" text-anchor="middle" fill="#8b9ab0" font-size="11">State machine · Decisions</text>
  <text x="440" y="283" text-anchor="middle" fill="#8b9ab0" font-size="11">Scene &amp; branch logic</text>

  <!-- Narrative Orchestrator box -->
  <rect x="600" y="220" width="200" height="80" rx="10" fill="#1a2235" stroke="#f0883e" stroke-width="1.5"/>
  <text x="700" y="245" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="bold">Narrative Orchestrator</text>
  <text x="700" y="263" text-anchor="middle" fill="#8b9ab0" font-size="11">LangChain · Prompt builder</text>
  <text x="700" y="279" text-anchor="middle" fill="#8b9ab0" font-size="11">Context injection</text>
  <text x="700" y="295" text-anchor="middle" fill="#8b9ab0" font-size="10">(Foundry IQ + LLM)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 3 — AI / DATA                        -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Azure Foundry IQ -->
  <rect x="80" y="400" width="200" height="90" rx="10" fill="#1a2235" stroke="#0078d4" stroke-width="2"/>
  <text x="180" y="428" text-anchor="middle" fill="#0078d4" font-size="13" font-weight="bold">Azure Foundry IQ</text>
  <text x="180" y="446" text-anchor="middle" fill="#8b9ab0" font-size="11">World lore · Characters</text>
  <text x="180" y="462" text-anchor="middle" fill="#8b9ab0" font-size="11">Rules · Grounded context</text>
  <text x="180" y="478" text-anchor="middle" fill="#8b9ab0" font-size="10">Reduces hallucinations ✓</text>

  <!-- LLM box -->
  <rect x="340" y="400" width="200" height="90" rx="10" fill="#1a2235" stroke="#e05c00" stroke-width="1.5"/>
  <text x="440" y="428" text-anchor="middle" fill="#e05c00" font-size="13" font-weight="bold">LLM</text>
  <text x="440" y="446" text-anchor="middle" fill="#8b9ab0" font-size="11">Claude API / GPT-4o</text>
  <text x="440" y="462" text-anchor="middle" fill="#8b9ab0" font-size="11">Narrative generation</text>
  <text x="440" y="478" text-anchor="middle" fill="#8b9ab0" font-size="10">Grounded by Foundry IQ</text>

  <!-- MongoDB -->
  <rect x="600" y="400" width="200" height="90" rx="10" fill="#1a2235" stroke="#00ed64" stroke-width="1.5"/>
  <text x="700" y="428" text-anchor="middle" fill="#00ed64" font-size="13" font-weight="bold">MongoDB Atlas</text>
  <text x="700" y="446" text-anchor="middle" fill="#8b9ab0" font-size="11">Player state · History</text>
  <text x="700" y="462" text-anchor="middle" fill="#8b9ab0" font-size="11">Session decisions</text>
  <text x="700" y="478" text-anchor="middle" fill="#8b9ab0" font-size="10">Persistent game memory</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ARROWS                                     -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- React → Node.js (WebSocket) -->
  <line x1="180" y1="152" x2="180" y2="220" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="180,220 175,210 185,210" fill="#4a90d9"/>
  <text x="188" y="190" fill="#4a90d9" font-size="9">WebSocket</text>

  <!-- Node.js → Game Engine -->
  <line x1="280" y1="260" x2="340" y2="260" stroke="#f0883e" stroke-width="1.5"/>
  <polygon points="340,260 330,255 330,265" fill="#f0883e"/>

  <!-- Game Engine → Orchestrator -->
  <line x1="540" y1="260" x2="600" y2="260" stroke="#f0883e" stroke-width="1.5"/>
  <polygon points="600,260 590,255 590,265" fill="#f0883e"/>

  <!-- Orchestrator → Foundry IQ -->
  <line x1="700" y1="300" x2="700" y2="360" stroke="#0078d4" stroke-width="1.5"/>
  <line x1="700" y1="360" x2="180" y2="360" stroke="#0078d4" stroke-width="1.5"/>
  <line x1="180" y1="360" x2="180" y2="400" stroke="#0078d4" stroke-width="1.5"/>
  <polygon points="180,400 175,390 185,390" fill="#0078d4"/>
  <text x="420" y="355" fill="#0078d4" font-size="9" text-anchor="middle">Query knowledge base</text>

  <!-- Orchestrator → LLM -->
  <line x1="700" y1="300" x2="700" y2="370" stroke="#e05c00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="700" y1="370" x2="440" y2="370" stroke="#e05c00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="440" y1="370" x2="440" y2="400" stroke="#e05c00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="440,400 435,390 445,390" fill="#e05c00"/>
  <text x="570" y="385" fill="#e05c00" font-size="9">Generate narrative</text>

  <!-- Node.js → MongoDB -->
  <line x1="280" y1="280" x2="580" y2="430" stroke="#00ed64" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="580,430 572,422 582,420" fill="#00ed64"/>
  <text x="390" y="390" fill="#00ed64" font-size="9">Save state</text>

  <!-- Copilot ↔ Developer -->
  <line x1="540" y1="112" x2="600" y2="112" stroke="#8b5cf6" stroke-width="1.5"/>
  <polygon points="600,112 590,107 590,117" fill="#8b5cf6"/>
  <polygon points="540,112 550,107 550,117" fill="#8b5cf6"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEGEND                                     -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="80" y="530" width="740" height="62" rx="8" fill="#1a2235" stroke="#2d3748" stroke-width="1"/>
  <text x="450" y="550" text-anchor="middle" fill="#8b9ab0" font-size="11" font-weight="bold">LEGEND</text>
  <line x1="100" y1="565" x2="130" y2="565" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="135" y="569" fill="#8b9ab0" font-size="10">Real-time (WebSocket)</text>
  <line x1="270" y1="565" x2="300" y2="565" stroke="#f0883e" stroke-width="1.5"/>
  <text x="305" y="569" fill="#8b9ab0" font-size="10">Backend flow</text>
  <line x1="420" y1="565" x2="450" y2="565" stroke="#0078d4" stroke-width="1.5"/>
  <text x="455" y="569" fill="#8b9ab0" font-size="10">Foundry IQ query</text>
  <line x1="580" y1="565" x2="610" y2="565" stroke="#e05c00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="615" y="569" fill="#8b9ab0" font-size="10">LLM generation</text>
  <line x1="100" y1="582" x2="130" y2="582" stroke="#00ed64" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="135" y="586" fill="#8b9ab0" font-size="10">DB persistence</text>
  <line x1="270" y1="582" x2="300" y2="582" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="305" y="586" fill="#8b9ab0" font-size="10">Dev ↔ Copilot</text>

</svg>
